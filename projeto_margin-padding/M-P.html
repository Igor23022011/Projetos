<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin & Padding</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><span>🎮 Margin e Padding — Estilo Gamer</span></h1>
    <div class="azul">
        <p>🎯 Padding: 30px — espaço interno</p>
        <p>O escudo azul cresceu para dentro.</p>
    </div>

    <div class="verde">
        <p>⚔️ Margin: 30px — espaço externo</p>
        <p>O bloco verde se afastou dos outros.</p>
    </div>

    <div class="laranja">
        <p>🔥 Margin: 20px + Padding: 20px</p>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </div>
</body>
</html>
